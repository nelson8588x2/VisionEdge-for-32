<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionEdge — 自動透視校正</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        light: {
                            50: '#ffffff',
                            100: '#f8f9fa',
                            200: '#e9ecef',
                            300: '#dee2e6',
                            400: '#ced4da',
                            500: '#adb5bd',
                            600: '#6c757d',
                            700: '#495057',
                            800: '#343a40',
                        },
                        accent: {
                            DEFAULT: '#4a5aff',
                            hover: '#3a4aee',
                            light: '#eef0ff',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-light-100 text-light-800 min-h-screen flex flex-col overflow-hidden">

    <!-- 頂部標籤列 -->
    <header class="bg-white h-[50px] flex items-center px-4 gap-2 flex-shrink-0 border-b border-light-300 shadow-sm">
        <h1 class="text-accent font-bold text-lg mr-5">VisionEdge</h1>
        
        <button class="tab-btn active" data-mode="calibration">Calibration</button>
        <button class="tab-btn" data-mode="chat">Chat</button>

        <div class="flex-1"></div>
        
        <span id="fps-label" class="text-light-600 text-xs">FPS: --</span>
        <span id="cam-info" class="text-light-600 text-xs ml-3">Camera: --</span>
    </header>

    <!-- 主要內容區域 -->
    <main class="flex-1 flex overflow-hidden p-3 gap-3">

        <!-- 左：原始影像 -->
        <section id="panel-original" class="flex flex-col flex-1 min-w-0">
            <h2 class="text-accent text-center text-sm font-bold mb-1">Original Feed</h2>
            <div class="relative flex-1 bg-white rounded-xl border border-light-300 shadow-sm flex items-center justify-center overflow-hidden">
                <video id="video-feed" autoplay playsinline muted class="max-w-full max-h-full object-contain"></video>
                <canvas id="canvas-capture" class="hidden"></canvas>
                <img id="img-original" class="max-w-full max-h-full object-contain hidden" alt="Original">
                <p id="video-placeholder" class="text-light-500 text-sm absolute">正在啟動攝影機...</p>
            </div>
        </section>

        <!-- 中：校正後影像 -->
        <section id="panel-corrected" class="flex flex-col flex-1 min-w-0">
            <h2 class="text-accent text-center text-sm font-bold mb-1">Corrected View</h2>
            <div class="relative flex-1 bg-white rounded-xl border border-light-300 shadow-sm flex items-center justify-center overflow-hidden">
                <img id="img-corrected" class="max-w-full max-h-full object-contain hidden" alt="Corrected">
                <canvas id="canvas-selection" class="absolute inset-0 w-full h-full hidden cursor-crosshair"></canvas>
                <p id="corrected-placeholder" class="text-light-500 text-sm absolute">等待校正...</p>
            </div>
        </section>

        <!-- 右：模式面板 -->
        <aside id="mode-panel" class="w-[280px] flex-shrink-0 flex flex-col gap-2 overflow-y-auto">

            <!-- Calibration 面板 -->
            <div id="mode-calibration" class="mode-content">
                <div class="panel-group">
                    <h3 class="panel-title">Calibration</h3>
                    <div id="status-indicator" class="flex items-center gap-2 mb-2">
                        <span id="status-dot" class="w-3 h-3 rounded-full bg-light-500"></span>
                        <span id="status-text" class="text-sm text-light-700">搜尋紙張中...</span>
                    </div>
                    <p class="text-xs text-light-600 mb-3">
                        放置 A4/A5 黑色邊框參考紙張在桌面上。<br>確保四邊完全可見。
                    </p>
                    <button id="btn-reset" class="btn-danger w-full">重置偵測</button>
                </div>
                <div class="panel-group">
                    <h3 class="panel-title">使用說明</h3>
                    <ol class="text-xs text-light-600 list-decimal list-inside space-y-1">
                        <li>列印 A4 黑色邊框參考紙</li>
                        <li>平放在桌面上</li>
                        <li>確保四邊清晰可見</li>
                        <li>校準自動完成</li>
                        <li>切換到 Chat 模式提問</li>
                    </ol>
                </div>
            </div>

            <!-- Chat 面板 -->
            <div id="mode-chat" class="mode-content hidden">
                <div class="panel-group flex-1 flex flex-col">
                    <h3 class="panel-title">Ask AI</h3>
                    <p class="text-xs text-light-600 mb-2">在校正後影像上拖曳選取區域，然後提問。</p>
                    <div id="chat-history" class="flex-1 overflow-y-auto text-sm space-y-2 mb-2 max-h-[400px]">
                        <div class="text-light-500 text-xs">
                            1. 在影像上拖曳選取區域<br>
                            2. 輸入問題<br>
                            3. 按 Send 或 Enter
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <input id="chat-input" type="text" placeholder="輸入問題..."
                            class="flex-1 bg-light-100 border border-light-300 rounded-md px-3 py-1.5 text-sm text-light-800 focus:outline-none focus:border-accent">
                        <button id="btn-chat-send" class="btn-primary px-3">Send</button>
                    </div>
                </div>
            </div>

        </aside>
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
